<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeus Interestelar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A0A1A; overflow: hidden; width: 100vw; height: 100vh; font-family: monospace; }

    #game { width: 100vw; height: 100vh; }

    #loginOverlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(5, 5, 20, 0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      color: #ccc;
    }
    #loginOverlay h1 { font-size: 2em; color: #00FF88; letter-spacing: 0.1em; }
    #loginOverlay select, #loginOverlay button {
      font-family: monospace; font-size: 1em;
      padding: 8px 20px; border-radius: 4px; border: 1px solid #444;
      background: #1a1a2e; color: #ccc; cursor: pointer;
    }
    #loginOverlay button:hover:not(:disabled) { background: #00FF88; color: #0A0A1A; }
    #loginOverlay button:disabled { opacity: 0.4; cursor: default; }
    #reconnectMsg { color: #aaa; font-size: 0.9em; }

    #contextMenu {
      display: none; position: fixed; z-index: 1000;
      background: #1a1a2e; border: 1px solid #444;
      border-radius: 4px; min-width: 160px;
      font-family: monospace; font-size: 13px;
    }
    #contextMenu .menu-title {
      padding: 8px 12px; color: #00FF88;
      border-bottom: 1px solid #333; font-weight: bold;
    }
    #contextMenu .menu-item {
      padding: 8px 12px; color: #ccc; cursor: pointer;
    }
    #contextMenu .menu-item:hover { background: #2a2a4a; color: #fff; }
    #contextMenu .menu-item.disabled { color: #555; cursor: default; }
    #contextMenu .menu-item.cancel { color: #FF6666; }

    #btnBar {
      position: fixed; bottom: 16px; right: 16px;
      display: flex; gap: 8px;
    }
    #btnBar button {
      font-family: monospace; font-size: 12px;
      padding: 6px 14px; border-radius: 4px;
      border: 1px solid #444; background: #1a1a2e;
      color: #ccc; cursor: pointer;
    }
    #btnBar button:hover { background: #2a2a4a; }
    #btnLogoff { color: #FF4444 !important; border-color: #FF4444 !important; }
    #btnLogoff:hover { background: #2a1a1a !important; }

    #statusBar {
      position: fixed; top: 8px; left: 8px;
      font-family: monospace; font-size: 11px; color: #555;
    }
  </style>
</head>
<body>

<div id="loginOverlay">
  <h1>Zeus Interestelar</h1>
  <p>Escolha seu planeta inicial:</p>
  <select id="startingBody">
    <option value="mercury">Mercúrio</option>
    <option value="venus">Vênus</option>
    <option value="earth" selected>Terra</option>
    <option value="mars">Marte</option>
    <option value="jupiter">Júpiter</option>
    <option value="saturn">Saturno</option>
    <option value="uranus">Urano</option>
    <option value="neptune">Netuno</option>
  </select>
  <button id="btnStart">Iniciar Jornada</button>
  <p id="reconnectMsg" style="display:none">Retomando sessão anterior...</p>
</div>

<div id="game"></div>

<div id="contextMenu"></div>

<div id="btnBar" style="display:none">
  <button id="btnCenter">Centralizar Frota</button>
  <button id="btnLogoff">Logoff</button>
</div>

<div id="statusBar"></div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
